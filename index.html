<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0f0f0f"/>
<link rel="manifest" href='data:application/manifest+json,{
  "display": "standalone",
  "start_url": "./",
  "name": "Meus Finanças",
  "short_name": "Finanças",
  "icons": [
    {
      "src": "logomeuapp.png",
      "sizes": "512x512",
      "type": "image/png",
      "purpose": "any maskable"
    }
  ]
}'>
<link rel="apple-touch-icon" href="logomeuapp.png">
<title>Meus Finanças</title>
<style>
/* ── TOKENS & DESIGN SYSTEM ─────────────────────────────────────── */
:root{
  --bg:#f8f9fa;--surface:#ffffff;--surface2:#f1f3f5;--border:rgba(0,0,0,.05);
  --text:#121214;--text2:#6c757d;--text3:#adb5bd;
  --accent:#3b6ef6;--accent2:#6c47ff;
  --metric-bg:#f8f9fa;--row-item-border:#f1f3f5;
  --input-bg:#f1f3f5;--input-color:#121214;--placeholder:#adb5bd;
  --leg-color:#495057;--cat-chip-bg:#f1f3f5;
  --info-bg:#e7f5ff;--info-color:#1c7ed6;
  --modal-bg:#ffffff;--overlay:rgba(0,0,0,.4);
  --add-btn-bg:linear-gradient(135deg,#3b6ef6,#6c47ff);--add-btn-color:#fff;
  --sec-btn-bg:#f1f3f5;--sec-btn-color:#495057;
  --action-btn-bg:#f1f3f5;--action-btn-color:#495057;
  --shadow-sm:0 2px 4px rgba(0,0,0,.02),0 1px 2px rgba(0,0,0,.02);
  --shadow-md:0 4px 12px rgba(0,0,0,.05);
  --shadow-lg:0 8px 24px rgba(0,0,0,.08);
  --radius:20px;--radius-sm:12px;--radius-xs:8px;
}
body.dark{
  --bg:#0c0c0e;--surface:#16161a;--surface2:#222227;--border:rgba(255,255,255,.04);
  --text:#f8f9fa;--text2:#a6a7ab;--text3:#5c5f66;
  --metric-bg:#222227;--row-item-border:#222227;
  --input-bg:#222227;--input-color:#f8f9fa;--placeholder:#5c5f66;
  --leg-color:#a6a7ab;--cat-chip-bg:#222227;
  --info-bg:#101f30;--info-color:#4dabf7;
  --modal-bg:#16161a;--overlay:rgba(0,0,0,.7);
  --add-btn-bg:linear-gradient(135deg,#3b6ef6,#6c47ff);--add-btn-color:#fff;
  --sec-btn-bg:#222227;--sec-btn-color:#c1c2c5;
  --action-btn-bg:#222227;--action-btn-color:#c1c2c5;
  --shadow-sm:0 2px 4px rgba(0,0,0,.2);
  --shadow-md:0 4px 12px rgba(0,0,0,.3);
  --shadow-lg:0 8px 24px rgba(0,0,0,.4);
}

/* ── RESET & BASE ────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:15px;transition:background .2s,color .2s;-webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom,0px)}
h1{font-size:22px;font-weight:700;padding:1.5rem 1rem .5rem;letter-spacing:-.5px}

/* ── TABS ────────────────────────────────────────────────────────── */
.tabs{display:flex;gap:4px;padding:.5rem 1rem;overflow-x:auto;scrollbar-width:none;background:var(--surface);position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border)}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{background:transparent;border:none;border-radius:var(--radius-sm);padding:8px 16px;font-size:14px;cursor:pointer;color:var(--text2);transition:all .2s;font-weight:500;white-space:nowrap}
.tab-btn.active{color:var(--accent);background:var(--info-bg);font-weight:600}

.tab{display:none;padding:1rem 1rem 7rem}
.tab.active{display:block}

/* ── INPUTS ──────────────────────────────────────────────────────── */
input,select{font-family:inherit;font-size:15px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;width:100%;background:var(--input-bg);color:var(--input-color);outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--accent)}
input::placeholder{color:var(--placeholder)}

/* ── CARDS ───────────────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.section-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px}

/* ── BUTTONS ─────────────────────────────────────────────────────── */
.add-btn{width:100%;padding:14px;font-size:15px;background:var(--add-btn-bg);border:none;border-radius:var(--radius-sm);cursor:pointer;color:var(--add-btn-color);font-weight:600;transition:opacity .15s;box-shadow:0 4px 12px rgba(59,110,246,0.2)}
.add-btn:hover{opacity:.95}
.sec-btn{width:100%;padding:12px;font-size:14px;background:var(--sec-btn-bg);border:none;border-radius:var(--radius-sm);cursor:pointer;color:var(--sec-btn-color);font-weight:500;margin-top:8px}

/* ── ROW TYPES (Otimizados contra poluição visual) ────────────────── */
.row-item-status {display:flex;align-items:center;justify-content:space-between;padding:12px 14px;margin-bottom:8px;border-radius:var(--radius-sm);border-left:4px solid transparent;background:var(--surface2)}
.row-renda{border-left-color:#2b8a3e;background:rgba(43,138,62,0.06)}
.row-vencida{border-left-color:#c92a2a;background:rgba(201,42,42,0.06)}
.row-avencer{border-left-color:#e67e22;background:rgba(230,126,34,0.06)}
.row-pago{border-left-color:#1c7ed6;background:rgba(28,126,214,0.06);opacity:0.7}
.row-pago .desc {text-decoration:line-through;color:var(--text2)}

/* ── FAB ─────────────────────────────────────────────────────────── */
.fab{position:fixed;bottom:34px;left:50%;transform:translateX(-50%);background:var(--add-btn-bg);color:#fff;border:none;border-radius:50px;padding:16px 32px;font-size:15px;font-weight:600;cursor:pointer;z-index:800;box-shadow:0 8px 24px rgba(59,110,246,.35);transition:transform .2s}
.fab:active{transform:translateX(-50%) scale(0.96)}

/* ── NAVIGATION MONTH ────────────────────────────────────────────── */
.nav-month{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem}
.nav-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);width:40px;height:40px;cursor:pointer;font-size:18px;color:var(--text);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm)}
.mes-titulo{font-size:16px;font-weight:700;flex:1;text-align:center}

/* ── HERO CARD ───────────────────────────────────────────────────── */
.hero-card{
  margin-bottom:16px;border-radius:var(--radius);
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
  padding:24px 20px;color:#fff;text-align:center;
}
.hero-saldo-label{font-size:13px;opacity:.8;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
.hero-saldo{font-size:38px;font-weight:800;letter-spacing:-1px;margin-bottom:20px}
.hero-chips{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hero-chip{background:rgba(255,255,255,.12);border-radius:var(--radius-sm);padding:10px;backdrop-filter:blur(8px)}
.hero-chip-label{font-size:11px;opacity:.75;margin-bottom:2px;text-transform:uppercase}
.hero-chip-val{font-size:15px;font-weight:700}

/* ── MODAL ───────────────────────────────────────────────────────── */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:var(--overlay);z-index:900;align-items:flex-end;justify-content:center;backdrop-filter:blur(5px)}
.modal-overlay.show{display:flex}
.modal-box{background:var(--modal-bg);border-radius:24px 24px 0 0;padding:1.5rem 1.5rem calc(2.5rem + env(safe-area-inset-bottom, 0px));width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:18px;font-weight:700}
.modal-close{background:var(--surface2);border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;color:var(--text2)}

/* ── BOTTOM NAV (Nativo iOS Style) ───────────────────────────────── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:600;
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;padding-bottom:env(safe-area-inset-bottom,0px);
  box-shadow:0 -4px 16px rgba(0,0,0,.03);
}
.bn-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:4px;padding:10px 4px 6px;cursor:pointer;border:none;background:transparent;color:var(--text3);
}
.bn-item.active{color:var(--accent)}
.bn-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2}
.bn-label{font-size:10px;font-weight:600}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(8px);background:#121214;color:#fff;padding:12px 24px;border-radius:50px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:all .2s linear;pointer-events:none;box-shadow:var(--shadow-lg)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:768px){
  .tabs{display:none}
  .tab{padding:1rem 1rem 8rem}
  .fab{bottom:90px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="tela-login" style="display:flex;position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);z-index:2000;align-items:center;justify-content:center;padding:1rem">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:2.5rem 1.5rem;width:100%;max-width:380px;box-shadow:var(--shadow-lg)">
    <div style="text-align:center;margin-bottom:2rem">
      <div style="font-size:42px;margin-bottom:10px">💰</div>
      <div style="font-size:22px;font-weight:800;letter-spacing:-0.5px">Meus Finanças</div>
      <div style="font-size:14px;color:var(--text2);margin-top:6px">Gerencie seu dinheiro sem complicação</div>
    </div>
    <div style="margin-bottom:12px">
      <input type="email" id="login-email" placeholder="E-mail" onkeydown="if(event.key==='Enter')fazerLogin()"/>
    </div>
    <div style="margin-bottom:20px">
      <input type="password" id="login-senha" placeholder="Senha" onkeydown="if(event.key==='Enter')fazerLogin()"/>
    </div>
    <button id="btn-login" class="add-btn" onclick="fazerLogin()">Entrar</button>
    <button id="btn-cadastro" class="sec-btn" onclick="fazerCadastro()">Criar conta</button>
  </div>
</div>

<!-- HEADER INTERNO APP -->
<div id="app-header" style="display:none">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:1rem;background:var(--surface);border-bottom:1px solid var(--border)">
    <span style="font-size:14px;color:var(--text2)">👤 <span id="user-email" style="font-weight:600;color:var(--text)"></span></span>
    <button onclick="fazerLogout()" style="background:var(--surface2);border:none;border-radius:20px;padding:6px 14px;font-size:12px;color:var(--text2);font-weight:600;cursor:pointer">Sair</button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div id="app-content" style="display:none">
  <div class="greeting-wrap" style="padding:1.5rem 1rem 1rem">
    <div id="greeting-periodo" style="font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px">Olá</div>
    <div style="font-size:28px;font-weight:800;letter-spacing:-0.5px">Guedes 👋</div>
  </div>

  <button class="fab" onclick="abrirModal()">+ Novo Lançamento</button>

  <!-- MODAL DE ENTRADAS -->
  <div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)fecharModal()">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">Novo Lançamento</span>
        <button class="modal-close" onclick="fecharModal()">×</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr;gap:12px">
        <input type="text" id="nl-desc" placeholder="Descrição (Ex: Mercado)"/>
        <input type="number" id="nl-valor" placeholder="Valor R$ 0,00" step="0.01"/>
        <select id="nl-cat">
          <option value="Alimentação">Alimentação</option>
          <option value="Transporte">Transporte</option>
          <option value="Saúde">Saúde</option>
          <option value="Lazer">Lazer</option>
          <option value="Moradia">Casa</option>
          <option value="Outros">Outros</option>
        </select>
        <input type="month" id="nl-mes"/>
        <button class="add-btn" onclick="confirmarLancamento()">Salvar Registro</button>
      </div>
    </div>
  </div>

  <!-- ABA: RESUMO -->
  <div id="tab-resumo" class="tab active">
    <div class="hero-card">
      <div class="hero-saldo-label">Saldo em Caixa</div>
      <div class="hero-saldo" id="hero-saldo">R$ 0,00</div>
      <div class="hero-chips">
        <div class="hero-chip">
          <div class="hero-chip-label">Entradas</div>
          <div class="hero-chip-val" id="hero-renda" style="color:#40c057">R$ 0,00</div>
        </div>
        <div class="hero-chip">
          <div class="hero-chip-label">Saídas</div>
          <div class="hero-chip-val" id="hero-gastos" style="color:#ff6b6b">R$ 0,00</div>
        </div>
      </div>
    </div>

    <div class="nav-month">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <span class="mes-titulo" id="mes-titulo">Janeiro 2026</span>
      <button class="nav-btn" onclick="changeMonth(1)">›</button>
    </div>

    <div class="card">
      <div class="section-title">Movimentações Recentes</div>
      <div id="res-contas"></div>
    </div>
  </div>

  <!-- ABA: LANÇAMENTOS -->
  <div id="tab-lancamentos" class="tab">
    <div class="card">
      <div class="section-title">Histórico Detalhedo</div>
      <div id="lista-lanc-despesas"></div>
    </div>
  </div>

  <!-- CONTAINER DE TABS ADICIONAIS VAZIAS (Evita erros de referência do JS antigo) -->
  <div id="tab-rendas" class="tab"></div>
  <div id="tab-contas" class="tab"></div>
  <div id="tab-metas" class="tab"></div>
  <div id="tab-graficos" class="tab"></div>
  <div id="tab-categorias" class="tab"></div>
  <div id="tab-historico" class="tab"></div>
  <div id="tab-configuracoes" class="tab"></div>

  <!-- BOTTOM NAVIGATION -->
  <nav class="bottom-nav">
    <button class="bn-item active" id="bn-resumo" onclick="setTab('resumo')">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span class="bn-label">Resumo</span>
    </button>
    <button class="bn-item" id="bn-lancamentos" onclick="setTab('lancamentos')">
      <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <span class="bn-label">Lançamentos</span>
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script>
// =====================================================================
// CONFIGURAÇÃO SUPABASE
// =====================================================================
const SUPABASE_URL = 'https://jjpkrdwisfvgdmlprjey.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpqcGtyZHdpc2Z2Z2RtbHByamV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3Nzk0OTMsImV4cCI6MjA5MTM1NTQ5M30.Lt1-J6FlC9pIFJ7QHq3WTzkItYJAiaEcjOm7F_726Fw';

let currentUser = null;
let userToken = null;
let viewYear = new Date().getFullYear();
let viewMonth = new Date().getMonth();
let cacheLancamentos = [];

const el = id => document.getElementById(id);
const fmt = v => 'R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits:2, maximumFractionDigits:2 });
const ymKey = (y,m) => y + '-' + String(m+1).padStart(2,'0');

function getH() {
  return {
    'Content-Type': 'application/json',
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + (userToken || SUPABASE_KEY)
  };
}

// =====================================================================
// AUTH CONECTADA
// =====================================================================
async function fazerLogin() {
  const email = el('login-email').value.trim();
  const senha = el('login-senha').value;
  if(!email || !senha) return alert('Insira os dados!');
  
  try {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method:'POST', headers: {'Content-Type':'application/json','apikey':SUPABASE_KEY},
      body: JSON.stringify({ email, password: senha })
    });
    const d = await r.json();
    if(!r.ok) throw new Error(d.error_description || 'Falha no login');
    
    userToken = d.access_token;
    currentUser = d.user;
    localStorage.setItem('mf_token', userToken);
    localStorage.setItem('mf_user', JSON.stringify(currentUser));
    mostrarApp();
  } catch(e) { alert(e.message); }
}

function fazerLogout() {
  localStorage.clear();
  location.reload();
}

function mostrarApp() {
  el('tela-login').style.display = 'none';
  el('app-header').style.display = 'block';
  el('app-content').style.display = 'block';
  el('user-email').textContent = currentUser.email;
  
  // Seta mês atual padrão nos inputs de data
  el('nl-mes').value = ymKey(viewYear, viewMonth);
  loadAll();
}

// =====================================================================
// DATA & INTERFACE ENGINE
// =====================================================================
async function loadAll() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/lancamentos?select=*&user_id=eq.${currentUser.id}`, { headers: getH() });
    if(r.ok) {
      cacheLancamentos = await r.json();
      renderTelas();
    }
  } catch(e) { console.error('Erro ao buscar dados:', e); }
}

function renderTelas() {
  const targetKey = ymKey(viewYear, viewMonth);
  
  // Titulo da view mensal
  const opcoes = { month: 'long', year: 'numeric' };
  el('mes-titulo').textContent = new Date(viewYear, viewMonth, 1).toLocaleDateString('pt-BR', opcoes).toUpperCase();
  
  // Filtros de mes ativo
  const itensMes = cacheLancamentos.filter(item => item.mes === targetKey);
  
  let totalEntradas = 0;
  let totalSaidas = 0;
  let htmlResumo = '';
  
  if(itensMes.length === 0) {
    htmlResumo = '<div style="text-align:center; padding:2rem; color:var(--text3)">Nenhum registro encontrado.</div>';
  }
  
  itensMes.forEach(item => {
    const valorNum = Number(item.valor);
    const classeTipo = item.tipo === 'renda' ? 'row-renda' : 'row-avencer';
    
    if(item.tipo === 'renda') totalEntradas += valorNum;
    else totalSaidas += valorNum;
    
    htmlResumo += `
      <div class="row-item-status ${classeTipo}">
        <div>
          <div class="desc" style="font-weight:600">${item.descricao}</div>
          <div style="font-size:11px; color:var(--text2)">${item.categoria || 'Geral'}</div>
        </div>
        <div style="font-weight:700">${fmt(valorNum)}</div>
      </div>
    `;
  });
  
  // Atualiza cartões de valores superiores
  el('hero-saldo').textContent = fmt(totalEntradas - totalSaidas);
  el('hero-renda').textContent = fmt(totalEntradas);
  el('hero-gastos').textContent = fmt(totalSaidas);
  
  el('res-contas').innerHTML = htmlResumo;
  el('lista-lanc-despesas').innerHTML = htmlResumo;
}

function changeMonth(dir) {
  viewMonth += dir;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  renderTelas();
}

function setTab(tabId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.bn-item').forEach(b => b.classList.remove('active'));
  
  const targetTab = el('tab-' + tabId);
  if(targetTab) targetTab.classList.add('active');
  
  const targetBtn = el('bn-' + tabId);
  if(targetBtn) targetBtn.classList.add('active');
}

// =====================================================================
// OPERAÇÕES / MODAL
// =====================================================================
function abrirModal() { el('modal-overlay').classList.add('show'); }
function fecharModal() { el('modal-overlay').classList.remove('show'); }

async function confirmarLancamento() {
  const descricao = el('nl-desc').value.trim();
  const valor = el('nl-valor').value;
  const categoria = el('nl-cat').value;
  const mes = el('nl-mes').value; // Formato yyyy-mm vindo do input native
  
  if(!descricao || !valor || !mes) return alert('Por favor preencha todos os campos!');
  
  // Decide dinamicamente se é gasto ou renda baseado na categoria (pode ser customizado)
  const tipo = ['Salário', 'Freela'].includes(categoria) ? 'renda' : 'gasto';
  
  const novoItem = {
    user_id: currentUser.id,
    descricao,
    valor: parseFloat(valor),
    categoria,
    mes,
    tipo
  };
  
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/lancamentos`, {
      method: 'POST',
      headers: getH(),
      body: JSON.stringify(novoItem)
    });
    
    if(r.ok) {
      fecharModal();
      toast('Adicionado com sucesso!');
      // Reseta formulário
      el('nl-desc').value = '';
      el('nl-valor').value = '';
      loadAll();
    }
  } catch(e) { toast('Erro ao registrar', true); }
}

function toast(msg, err=false) {
  const t = el('toast');
  t.textContent = msg;
  t.style.background = err ? '#c92a2a' : '#121214';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Auto-login se houver token persistido
window.addEventListener('DOMContentLoaded', () => {
  const token = localStorage.getItem('mf_token');
  const user = localStorage.getItem('mf_user');
  if(token && user) {
    userToken = token;
    currentUser = JSON.parse(user);
    mostrarApp();
  }
});
</script>
